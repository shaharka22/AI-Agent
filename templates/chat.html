<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DisasterGuard Agent</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --bubble-user: #2563eb;
    --bubble-agent: #1f2430;
    --text: #e8eaf0;
    --muted: #8a8f9c;
    --accent: #ef4444;
    --green: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    background: var(--panel);
    border-bottom: 1px solid #262b36;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 18px; margin: 0; }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 15px;
  }
  .msg.user { align-self: flex-start; background: var(--bubble-user); color: white; border-bottom-left-radius: 4px; }
  .msg.agent { align-self: flex-end; background: var(--bubble-agent); border-bottom-right-radius: 4px; }
  .msg.loading { opacity: 0.6; font-style: italic; }
  .msg.closure {
    align-self: flex-end;
    background: #1a2e1a;
    border: 1px solid var(--green);
    border-bottom-right-radius: 4px;
  }
  footer {
    padding: 14px 20px;
    background: var(--panel);
    border-top: 1px solid #262b36;
    display: flex;
    gap: 10px;
  }
  #input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #2c3140;
    background: #11141a;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  #input:focus { border-color: var(--bubble-user); }
  button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: var(--bubble-user);
    color: white;
    font-size: 15px;
    cursor: pointer;
  }
  button:hover { background: #1d4fd1; }
  button.secondary { background: transparent; color: var(--muted); border: 1px solid #2c3140; }
  button.confirm-btn {
    background: var(--green);
    color: white;
    margin-top: 10px;
    width: 100%;
    font-size: 14px;
    padding: 10px;
  }
  button.confirm-btn:hover { background: #16a34a; }
  .examples { padding: 0 20px 10px; display: flex; flex-wrap: wrap; gap: 8px; }
  .example {
    font-size: 13px; color: var(--muted); border: 1px solid #2c3140; border-radius: 20px;
    padding: 6px 12px; cursor: pointer; background: var(--panel);
  }
  .example:hover { border-color: var(--bubble-user); color: var(--text); }
</style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>🌍 DisasterGuard Agent</h1>
  </header>

  <div class="examples" id="examples">
    <div class="example">מה קרה בשריפות הענק באוסטרליה בשנת 2020?</div>
    <div class="example">האם יש כרגע רעידות אדמה חזקות בעולם?</div>
    <div class="example">יש שריפה בתל אביב, מה לעשות?</div>
    <div class="example">מספרי חירום בישראל</div>
  </div>

  <div id="chat"></div>

  <footer>
    <button class="secondary" id="clearBtn">איפוס שיחה</button>
    <input id="input" type="text" placeholder="שאל את הסוכן..." autofocus>
    <button id="sendBtn">שלח</button>
  </footer>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const clearBtn = document.getElementById("clearBtn");
const examples = document.getElementById("examples");

function addMessage(text, who, isClosure = false) {
  const div = document.createElement("div");
  div.className = "msg " + who + (isClosure ? " closure" : "");
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showClosureMessage(text) {
  const div = addMessage(text, "agent", true);

  const btn = document.createElement("button");
  btn.className = "confirm-btn";
  btn.textContent = "✓ הבנתי — סיים שיחה";
  btn.addEventListener("click", async () => {
    await clearSession();
    chat.innerHTML = "";
    addMessage("השיחה אופסה. אני כאן אם תצטרך עזרה נוספת 🌍", "agent");
  });
  div.appendChild(document.createElement("br"));
  div.appendChild(btn);
  chat.scrollTop = chat.scrollHeight;
}

async function clearSession() {
  await fetch("/api/clear", { method: "POST" });
}

async function send(text) {
  if (!text) return;
  addMessage(text, "user");
  input.value = "";
  const loading = addMessage("חושב...", "agent loading");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    loading.remove();

    let reply = data.reply || data.error || "שגיאה לא ידועה.";

    if (reply.includes("##INCIDENT_CLOSED##")) {
      reply = reply.replace("##INCIDENT_CLOSED##", "").trim();
      showClosureMessage(reply);
    } else {
      addMessage(reply, "agent");
    }
  } catch (e) {
    loading.remove();
    addMessage("⚠️ שגיאת רשת: " + e, "agent");
  }
}

sendBtn.addEventListener("click", () => send(input.value.trim()));
input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(input.value.trim()); });
examples.addEventListener("click", (e) => {
  if (e.target.classList.contains("example")) send(e.target.textContent);
});
clearBtn.addEventListener("click", async () => {
  await clearSession();
  chat.innerHTML = "";
  addMessage("השיחה אופסה.", "agent");
});

addMessage("שלום! אני DisasterGuard Agent — סוכן AI לניהול משברים וניטור אסונות טבע. איך אפשר לעזור?", "agent");
</script>
</body>
</html>
